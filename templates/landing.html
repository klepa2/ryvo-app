<!DOCTYPE html>
<html>

<head>
    <title>RYVO | Найди компанию</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a1628 0%, #0f1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        .logo-text {
            font-size: 90px;
            font-weight: 800;
            letter-spacing: 20px;
            color: #ffffff;
            text-align: center;
        }

        .subtitle {
            color: #a0b3d9;
            font-size: 16px;
            text-align: center;
            margin: 20px 0 40px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a73e8, #1557b0);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            color: #1a73e8;
            border: 2px solid #1a73e8;
        }
    </style>
</head>

<body>
    <div>
        <div class="logo-text">RYVO</div>
        <div class="subtitle">НАЙДИ КОМПАНИЮ ДЛЯ ЛЮБОГО МЕРОПРИЯТИЯ</div>
        <div class="buttons">
            <a href="/register-page" class="btn btn-primary">Зарегистрироваться</a>
            <a href="/login-page" class="btn btn-secondary">Вход</a>
        </div>
    </div>
</body>

</html>
