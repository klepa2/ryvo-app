<!DOCTYPE html>
<html>

<head>
    <title>Профиль | RYVO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1628;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            padding-bottom: 80px;
        }

        .header {
            background: #0f1a2e;
            padding: 15px20px;
            border-bottom: 1px solid #1e2a44;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
        }

        .header h1 span {
            color: #1a73e8;
        }

        .content {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .avatar-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: #1e2a44;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid #1a73e8;
        }

        .avatar-placeholder {
            font-size: 60px;
        }

        .info-card {
            background: #1e2a44;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .info-row {
            margin-bottom: 20px;
        }

        .info-label {
            color: #6b7b9e;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #fff;
            font-size: 16px;
            background: #0f1a2e;
            padding: 12px;
            border-radius: 12px;
        }

        .edit-btn,
        .save-btn {
            background: #1a73e8;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .logout-btn {
            background: #d93025;
            margin-top: 10px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f1a2e;
            display: flex;
            justify-content: space-around;
            padding: 12px20px20px;
            border-top: 1px solid #1e2a44;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #6b7b9e;
            font-size: 12px;
            padding: 8px16px;
            border-radius: 30px;
        }

        .nav-item.active {
            color: #1a73e8;
            background: rgba(26, 115, 232, 0.1);
        }

        .nav-icon {
            font-size: 24px;
        }

        textarea {
            background: #0f1a2e;
            border: 1px solid #2a3a5a;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>RYVO<span>.</span></h1>
    </div>
    <div class="content">
        <div class="avatar-section">
            <div class="avatar" onclick="document.getElementById('avatar-input').click()">
                {% if user.avatar %}<img src="data:image/png;base64,{{ user.avatar }}">{% else %}<div
                    class="avatar-placeholder">👤</div>{% endif %}
            </div>
            <input type="file" id="avatar-input" accept="image/png,image/jpeg" style="display:none"
                onchange="uploadAvatar(this)">
        </div>
        <div class="info-card" id="view-mode">
            <div class="info-row">
                <div class="info-label">👤 Имя пользователя</div>
                <div class="info-value">{{ user.username }}</div>
            </div>
            <div class="info-row">
                <div class="info-label">📝 О себе</div>
                <div class="info-value" id="bio-view">{{ user.bio or 'Расскажите о себе...' }}</div>
            </div>
            <button class="edit-btn" onclick="enableEdit()">✏️ Редактировать</button>
            <button class="edit-btn logout-btn" onclick="logout()">🚪 Выйти</button>
        </div>
        <div class="info-card" id="edit-mode" style="display:none">
            <textarea id="bio-edit" rows="3">{{ user.bio or '' }}</textarea>
            <button class="save-btn" onclick="saveProfile()">💾 Сохранить</button>
            <button class="edit-btn" onclick="cancelEdit()" style="margin-top:10px">Отмена</button>
        </div>
    </div>
    <div class="bottom-nav">
        <a href="/" class="nav-item"><span class="nav-icon">📋</span><span>Все</span></a>
        <a href="/my-chats" class="nav-item"><span class="nav-icon">💬</span><span>Чаты</span></a>
        <a href="/profile" class="nav-item active"><span class="nav-icon">👤</span><span>Профиль</span></a>
    </div>
    <script>
        function enableEdit() { document.getElementById('view-mode').style.display = 'none'; document.getElementById('edit-mode').style.display = 'block'; }
        function cancelEdit() { document.getElementById('view-mode').style.display = 'block'; document.getElementById('edit-mode').style.display = 'none'; }
        async function saveProfile() { const bio = document.getElementById('bio-edit').value; await fetch('/api/update-profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ bio: bio }) }); location.reload(); }
        async function uploadAvatar(input) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async function (e) { const base64 = e.target.result.split(',')[1]; await fetch('/api/upload-avatar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ avatar: base64 }) }); location.reload(); }; reader.readAsDataURL(file); }
        function logout() { window.location.href = '/logout'; }
    </script>
</body>

</html>
