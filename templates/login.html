<!DOCTYPE html>
<html>

<head>
    <title>Вход | RYVO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1628;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        .container {
            background: #1e2a44;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #c0d0f0;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0f1a2e;
            border: 2px solid #2a3a5a;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #a0b3d9;
        }

        a {
            color: #1a73e8;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 Вход</h1>
        <form method="post" action="/login">
            <div class="input-group"><label>👤 Имя пользователя</label><input type="text" name="username" required
                    autofocus></div>
            <div class="input-group"><label>🔒 Пароль</label><input type="password" name="password" required></div>
            <button type="submit">Войти</button>
        </form>
        <div class="register-link">Нет аккаунта? <a href="/register-page">Зарегистрироваться</a></div>
    </div>
</body>

</html>
