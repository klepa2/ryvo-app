<!DOCTYPE html>
<html>

<head>
    <title>Создать мероприятие</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1628;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1e2a44;
            border-radius: 16px;
            padding: 30px;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            color: #c0d0f0;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #2a3a5a;
            border-radius: 8px;
            background: #0f1a2e;
            color: white;
            font-size: 14px;
        }

        button {
            background: #1a73e8;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #1a73e8;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>➕ Создать мероприятие</h1>
        <form method="POST">
            <label>Название</label><input type="text" name="title" required>
            <label>Описание</label><textarea name="description" rows="3" placeholder="Коротко о событии..."></textarea>
            <label>Дата и время</label><input type="text" name="date" placeholder="Суббота, 20:00" required>
            <label>Место</label><input type="text" name="location" placeholder="Адрес или название места" required>
            <label>Максимум участников</label><input type="number" name="max_participants" value="20" min="1" required>
            <button type="submit">✅ Создать</button>
        </form><a href="/" class="back-link">← Назад</a>
    </div>
</body>

</html>
