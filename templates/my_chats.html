<!DOCTYPE html>
<html>

<head>
    <title>Мои чаты | RYVO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1628;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            padding-bottom: 80px;
        }

        .header {
            background: #0f1a2e;
            padding: 15px20px;
            border-bottom: 1px solid #1e2a44;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
        }

        .header h1 span {
            color: #1a73e8;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .chat-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px20px;
            background: #1e2a44;
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: #0f1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
        }

        .chat-info {
            flex: 1;
        }

        .chat-title {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .chat-location {
            color: #6b7b9e;
            font-size: 12px;
        }

        .chat-date {
            color: #6b7b9e;
            font-size: 11px;
            background: #0f1a2e;
            padding: 4px10px;
            border-radius: 12px;
        }

        .empty-message {
            text-align: center;
            color: #a0b3d9;
            padding: 40px;
            background: #1e2a44;
            border-radius: 16px;
        }

        .empty-message a {
            display: inline-block;
            margin-top: 15px;
            background: #1a73e8;
            color: #fff;
            padding: 10px20px;
            text-decoration: none;
            border-radius: 25px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f1a2e;
            display: flex;
            justify-content: space-around;
            padding: 12px20px20px;
            border-top: 1px solid #1e2a44;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #6b7b9e;
            font-size: 12px;
            padding: 8px16px;
            border-radius: 30px;
        }

        .nav-item.active {
            color: #1a73e8;
            background: rgba(26, 115, 232, 0.1);
        }

        .nav-icon {
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>RYVO<span>.</span></h1>
    </div>
    <div class="content">
        {% for event in events %}
        <div class="chat-card" onclick="location.href='/chat/{{ event.id }}'">
            <div class="chat-avatar">{% if event.creator_avatar %}<img
                    src="data:image/png;base64,{{ event.creator_avatar }}">{% else %}🎉{% endif %}</div>
            <div class="chat-info">
                <div class="chat-title">{{ event.title }}</div>
                <div class="chat-location">{{ event.location }}</div>
            </div>
            <div class="chat-date">{{ event.date.split(',')[0] if event.date else 'Скоро' }}</div>
        </div>
        {% endfor %}
        {% if not events %}
        <div class="empty-message">
            <p>✨ У вас пока нет чатов</p>
            <a href="/">📋 Посмотреть мероприятия</a>
        </div>
        {% endif %}
    </div>
    <div class="bottom-nav">
        <a href="/" class="nav-item"><span class="nav-icon">📋</span><span>Все</span></a>
        <a href="/my-chats" class="nav-item active"><span class="nav-icon">💬</span><span>Чаты</span></a>
        <a href="/profile" class="nav-item"><span class="nav-icon">👤</span><span>Профиль</span></a>
    </div>
</body>

</html>
